kind = "web"
previewPath = "/"
title = "Fox & Feather"
version = "1.0.0"
id = "artifacts/fox-feather"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19376

[services.development]
run = "pnpm --filter @workspace/fox-feather run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fox-feather", "run", "build" ]
publicDir = "artifacts/fox-feather/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19376"
BASE_PATH = "/"
